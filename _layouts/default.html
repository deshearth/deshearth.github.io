<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    {% if site.description and site.description != "" %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}
    <script>
      (function () {
        var root = document.documentElement;
        var key = "theme-preference";
        var media = window.matchMedia("(prefers-color-scheme: light)");
        var stored = "";

        try {
          stored = localStorage.getItem(key) || "";
        } catch (error) {
          stored = "";
        }

        if (stored === "light" || stored === "dark") {
          root.dataset.theme = stored;
        } else {
          root.dataset.theme = media.matches ? "light" : "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <div class="site-brand">
          <div class="site-title-frame">
            <h1 class="site-title">
              <a href="{{ '/' | relative_url }}">
                <span class="site-name-latin">{{ site.title }}</span>
                <span class="site-name-cjk" lang="zh-Hans">褚毅锋</span>
              </a>
            </h1>
          </div>
        </div>

        <div class="site-actions">
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme" title="Switch color theme">
            <span class="theme-toggle-icon theme-icon-sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                <circle cx="12" cy="12" r="4.25"></circle>
                <path d="M12 1.75v3.1M12 19.15v3.1M4.75 4.75l2.2 2.2M17.05 17.05l2.2 2.2M1.75 12h3.1M19.15 12h3.1M4.75 19.25l2.2-2.2M17.05 6.95l2.2-2.2"></path>
              </svg>
            </span>
            <span class="theme-toggle-icon theme-icon-moon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                <path d="M14.5 2.35a8.95 8.95 0 1 0 7.15 13.95 8.1 8.1 0 0 1-3.7.85 8.55 8.55 0 0 1-8.55-8.55 8.1 8.1 0 0 1 5.1-7.25Z"></path>
              </svg>
            </span>
          </button>

          <details class="site-nav-shell">
            <summary class="site-nav-toggle" aria-label="Open navigation">
              <span class="nav-bars" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </summary>

            <nav class="site-nav" aria-label="Primary">
              <a href="{{ '/' | relative_url }}#about">About</a>
              <a href="{{ '/' | relative_url }}#research">Research</a>
              <a href="{{ '/' | relative_url }}#publications">Publications</a>
            </nav>
          </details>
        </div>
      </header>

      <main class="folio">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>
          <span class="status-file">{{ page.title | default: "Home" | upcase }}</span>
        </p>
      </footer>
    </div>
    <script>
      (function () {
        var root = document.documentElement;
        var key = "theme-preference";
        var media = window.matchMedia("(prefers-color-scheme: light)");

        function readStoredTheme() {
          try {
            var stored = localStorage.getItem(key);
            return stored === "light" || stored === "dark" ? stored : "";
          } catch (error) {
            return "";
          }
        }

        function writeStoredTheme(theme) {
          try {
            localStorage.setItem(key, theme);
          } catch (error) {
            return;
          }
        }

        function getSystemTheme() {
          return media.matches ? "light" : "dark";
        }

        function updateToggle(theme) {
          var button = document.querySelector("[data-theme-toggle]");
          var next = theme === "light" ? "dark" : "light";

          if (!button) {
            return;
          }

          button.setAttribute("aria-label", "Switch to " + next + " theme");
          button.setAttribute("title", "Switch to " + next + " theme");
          button.setAttribute("aria-pressed", theme === "light" ? "true" : "false");
        }

        function applyTheme(theme) {
          root.dataset.theme = theme;
          updateToggle(theme);
        }

        applyTheme(readStoredTheme() || getSystemTheme());

        document.addEventListener("DOMContentLoaded", function () {
          var button = document.querySelector("[data-theme-toggle]");

          updateToggle(root.dataset.theme || getSystemTheme());

          if (!button) {
            return;
          }

          button.addEventListener("click", function () {
            var next = (root.dataset.theme || getSystemTheme()) === "light" ? "dark" : "light";
            writeStoredTheme(next);
            applyTheme(next);
          });
        });

        function handleSystemChange() {
          if (!readStoredTheme()) {
            applyTheme(getSystemTheme());
          }
        }

        if (media.addEventListener) {
          media.addEventListener("change", handleSystemChange);
        } else if (media.addListener) {
          media.addListener(handleSystemChange);
        }
      })();
    </script>
  </body>
</html>
